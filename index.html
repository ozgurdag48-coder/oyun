<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KKTC Telekom Teknisyen Uygulaması</title>
    <style>
        :root {
            --primary-blue: #0066cc;
            --secondary-green: #28a745;
            --danger-red: #dc3545;
            --bg-gray: #f2f2f7;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Responsive Container */
        .screen {
            background: white;
            width: 100%;
            max-width: 500px; /* Masaüstünde telefon formu */
            height: 100%;
            display: none;
            flex-direction: column;
            position: relative;
        }

        @media (min-width: 600px) {
            .screen {
                height: 90vh;
                margin-top: 5vh;
                border-radius: 20px;
                box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            }
        }

        .active { display: flex; }

        /* Typography & Spacing */
        .padding { padding: 20px; }
        h1 { color: var(--primary-blue); text-align: center; font-size: 1.5rem; margin-bottom: 1.5rem; }
        h2 { font-size: 1.2rem; margin-bottom: 1rem; }

        /* Form Elements */
        input, textarea {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px; /* Mobilde zoom yapmaması için minimum 16px */
            background: #fafafa;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:active { opacity: 0.7; }
        button.secondary { background-color: var(--secondary-green); }
        button.danger { background-color: var(--danger-red); }
        button.ghost { background: none; color: #666; font-weight: normal; }

        /* List & Scrolling Area */
        .content-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .list-item {
            padding: 15px;
            background: #fff;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #eee;
            box-shadow: var(--card-shadow);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #f9f9f9;
            margin-bottom: 8px;
            border-radius: 8px;
        }

        .checkbox-group input { width: auto; margin-right: 12px; margin-bottom: 0; transform: scale(1.2); }

        .footer-text {
            text-align: center;
            font-size: 11px;
            color: #aaa;
            padding: 15px;
            letter-spacing: 1px;
        }

        /* Navbar Header for sub-screens */
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <div id="login-screen" class="screen active">
        <div class="padding" style="margin-top: 20%;">
            <h1>KKTC TELEKOM</h1>
            <input type="text" id="login-user" placeholder="Kullanıcı Adı (ozgur dag)">
            <input type="password" id="login-pw" placeholder="Şifre (1234)">
            <button onclick="login()">GİRİŞ YAP</button>
            <button class="ghost" onclick="showScreen('forgot-pw-screen')">Şifremi Unuttum</button>
        </div>
        <div class="footer-text">DESIGNED BY ÖZGÜR DAĞ</div>
    </div>

    <!-- ŞİFRE SIFIRLAMA -->
    <div id="forgot-pw-screen" class="screen">
        <div class="padding">
            <h1>ŞİFRE SIFIRLAMA</h1>
            <p style="text-align:center; color:#666;">Kayıtlı e-posta adresinizi giriniz.</p>
            <input type="email" id="reset-mail" placeholder="E-posta Adresiniz">
            <div id="reset-msg" style="text-align: center; margin-bottom: 15px; font-weight: bold;"></div>
            <button class="secondary" onclick="resetPassword()">ŞİFRE ÜRET</button>
            <button class="ghost" onclick="showScreen('login-screen')">Giriş Ekranına Dön</button>
        </div>
    </div>

    <!-- ANA MENÜ -->
    <div id="menu-screen" class="screen">
        <div class="padding">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h2 id="welcome-msg">Hoşgeldiniz</h2>
                <div style="color: var(--primary-blue); font-weight: bold;">Teknisyen Paneli</div>
            </div>
            <button onclick="openKayit()">➕ YENİ GÜNLÜK KAYDI</button>
            <button onclick="loadReports()">📊 RAPORLAR / ARŞİV</button>
            <button onclick="alert('Profil düzenleme yakında eklenecektir.')">👤 PROFİL AYARLARI</button>
            
            <div id="admin-area" style="display:none; margin-top: 20px; border-top: 2px solid #eee; pt: 20px;">
                <p style="font-size: 12px; color: #888;">Yönetici Araçları</p>
                <button class="secondary" onclick="alert('Yönetim paneli aktif.')">KULLANICI YÖNETİMİ</button>
            </div>
        </div>
        <div style="margin-top: auto;" class="padding">
            <button class="danger" onclick="logout()">GÜVENLİ ÇIKIŞ</button>
        </div>
    </div>

    <!-- KAYIT EKRANI -->
    <div id="kayit-screen" class="screen">
        <div class="nav-header">
            <button style="width:auto; margin:0;" class="danger" onclick="showScreen('menu-screen')">İPTAL</button>
            <h3 style="margin:0; font-size:16px;">Yeni Kayıt</h3>
            <button style="width:auto; margin:0;" class="secondary" onclick="saveRecord()">KAYDET</button>
        </div>
        <div class="content-area">
            <label>İş Detayı:</label>
            <textarea id="task-desc" placeholder="Yapılan müdahale, lokasyon ve sonuç..." rows="4"></textarea>
            
            <label>Çalışan Ekip:</label>
            <div id="personel-list" style="margin-top:10px;">
                <!-- JS ile dolacak -->
            </div>
            
            <div class="checkbox-group" style="margin-top:15px; background: #fff5f5; border: 1px solid #ffebeb;">
                <input type="checkbox" id="mesai-check"> 
                <label for="mesai-check" style="color:var(--danger-red); font-weight:bold;">EK MESAİ ONAYI</label>
            </div>
        </div>
    </div>

    <!-- RAPOR EKRANI -->
    <div id="rapor-screen" class="screen">
        <div class="nav-header">
            <button style="width:40px; margin:0;" class="ghost" onclick="showScreen('menu-screen')">◀</button>
            <h3 style="margin:0; font-size:16px;">Kayıt Arşivi</h3>
            <button style="width:auto; margin:0; font-size: 12px;" class="secondary" onclick="exportCSV()">EXPORT</button>
        </div>
        <div class="padding" style="padding-bottom:0;">
            <input type="text" id="report-search" placeholder="İçerik veya isim ile ara..." onkeyup="filterReports()">
        </div>
        <div id="report-list" class="content-area">
            <!-- Kayıtlar buraya gelecek -->
        </div>
    </div>

    <script>
        // --- DATA VE STATE ---
        let currentUser = "";
        const personeller = ["MUSTAFA ADIŞANLI", "MEHMET KUZU", "KAYHAN SEZGİN", "ÖZGÜR TÜRKKAL", "ÖZGÜR DAĞ"];
        
        // Örnek veriler (Localstorage kullanılabilir)
        let kayitlar = JSON.parse(localStorage.getItem('telekom_kayitlar')) || [];

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- GİRİŞ MANTIĞI ---
        function login() {
            const userInp = document.getElementById('login-user').value.trim().toLowerCase();
            const pwInp = document.getElementById('login-pw').value;

            // Örnek giriş kontrolü
            if (userInp === "ozgur dag" && pwInp === "1234") {
                currentUser = userInp;
                document.getElementById('welcome-msg').innerText = "Hoşgeldin, " + userInp.toUpperCase();
                document.getElementById('admin-area').style.display = "block";
                showScreen('menu-screen');
            } else {
                alert("Kullanıcı adı veya şifre hatalı!\nDenemek için: ozgur dag / 1234");
            }
        }

        function logout() {
            currentUser = "";
            document.getElementById('login-user').value = "";
            document.getElementById('login-pw').value = "";
            showScreen('login-screen');
        }

        // --- KAYIT İŞLEMLERİ ---
        function openKayit() {
            const container = document.getElementById('personel-list');
            container.innerHTML = "";
            personeller.forEach(p => {
                container.innerHTML += `
                    <div class="checkbox-group">
                        <input type="checkbox" class="p-check" id="p-${p}" value="${p}"> 
                        <label for="p-${p}">${p}</label>
                    </div>`;
            });
            document.getElementById('task-desc').value = "";
            document.getElementById('mesai-check').checked = false;
            showScreen('kayit-screen');
        }

        function saveRecord() {
            const desc = document.getElementById('task-desc').value.trim();
            const selected = Array.from(document.querySelectorAll('.p-check:checked')).map(cb => cb.value);
            const mesai = document.getElementById('mesai-check').checked;

            if(!desc) { alert("Lütfen iş detayını giriniz!"); return; }
            if(selected.length === 0) { alert("En az bir personel seçmelisiniz!"); return; }

            const now = new Date();
            const dateStr = now.toLocaleDateString('tr-TR') + " " + now.toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'});

            const record = {
                id: "T-" + Math.floor(1000 + Math.random()*9000),
                user: currentUser,
                desc: desc,
                team: selected.join(", "),
                mesai: mesai ? "Evet" : "Hayır",
                date: dateStr,
                timestamp: now.getTime()
            };

            kayitlar.unshift(record);
            localStorage.setItem('telekom_kayitlar', JSON.stringify(kayitlar));
            
            alert("İş kaydı başarıyla sisteme işlendi.");
            showScreen('menu-screen');
        }

        // --- RAPORLAMA ---
        function loadReports() {
            showScreen('rapor-screen');
            filterReports();
        }

        function filterReports() {
            const term = document.getElementById('report-search').value.toLowerCase();
            const container = document.getElementById('report-list');
            container.innerHTML = "";

            const filtered = kayitlar.filter(r => 
                r.desc.toLowerCase().includes(term) || 
                r.team.toLowerCase().includes(term) ||
                r.id.toLowerCase().includes(term)
            );

            if(filtered.length === 0) {
                container.innerHTML = "<p style='text-align:center; color:#999; margin-top:20px;'>Kayıt bulunamadı.</p>";
                return;
            }

            filtered.forEach(r => {
                container.innerHTML += `
                    <div class="list-item">
                        <div style="display:flex; justify-content:space-between; border-bottom:1px solid #f0f0f0; margin-bottom:8px; padding-bottom:4px;">
                            <span style="font-weight:bold; color:var(--primary-blue);">${r.id}</span>
                            <span style="font-size:12px; color:#888;">${r.date}</span>
                        </div>
                        <div style="font-size:15px; margin-bottom:10px;">${r.desc}</div>
                        <div style="font-size:12px; color:#555; background:#f0f7ff; padding:5px; border-radius:4px;">
                            <strong>Ekip:</strong> ${r.team} <br>
                            <strong>Mesai:</strong> ${r.mesai}
                        </div>
                    </div>`;
            });
        }

        function exportCSV() {
            if(kayitlar.length === 0) { alert("Dışa aktarılacak kayıt yok!"); return; }
            
            let csv = "ID;Tarih;Is Detayi;Ekip;Mesai\n";
            kayitlar.forEach(r => {
                csv += `${r.id};${r.date};${r.desc.replace(/;/g,',')};${r.team};${r.mesai}\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "Telekom_Rapor.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function resetPassword() {
            const mail = document.getElementById('reset-mail').value;
            if(mail.includes("@")) {
                const msg = document.getElementById('reset-msg');
                msg.innerHTML = "Sıfırlama kodu gönderildi!<br>Geçici Şifre: TELEKOM2024";
                msg.style.color = "var(--secondary-green)";
            } else {
                alert("Geçerli bir e-posta adresi giriniz.");
            }
        }
    </script>
</body>
</html>
