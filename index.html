<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Hafıza Oyunu</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 { color: var(--primary); margin-bottom: 10px; }
        
        .stats {
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .game-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 500px;
            width: 100%;
        }

        .card {
            aspect-ratio: 1;
            background-color: var(--primary);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            color: transparent;
            transition: transform 0.3s, background-color 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            user-select: none;
        }

        .card.flipped {
            background-color: white;
            color: initial;
            transform: rotateY(180deg);
        }

        .card.matched {
            background-color: #55efc4;
            color: white;
            cursor: default;
        }

        button {
            margin-top: 30px;
            padding: 10px 25px;
            font-size: 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover { background-color: var(--secondary); }

        @media (max-width: 400px) {
            .game-container { gap: 10px; }
            .card { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <h1>Hafıza Oyunu</h1>
    
    <div class="stats">
        Hamle Sayısı: <span id="moves">0</span>
    </div>

    <div class="game-container" id="gameBoard">
        <!-- Kartlar JavaScript ile buraya gelecek -->
    </div>

    <button onclick="resetGame()">Yeniden Başlat</button>

    <script>
        const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
        let cards = [...emojis, ...emojis]; // Her emojiden ikişer tane
        let flippedCards = [];
        let matchedCount = 0;
        let moves = 0;
        let canFlip = true;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            shuffle(cards).forEach((emoji, index) => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('card');
                cardElement.dataset.emoji = emoji;
                cardElement.dataset.index = index;
                cardElement.onclick = () => flipCard(cardElement);
                board.appendChild(cardElement);
            });
        }

        function flipCard(card) {
            if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            card.textContent = card.dataset.emoji;
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            canFlip = false;

            if (card1.dataset.emoji === card2.dataset.emoji) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedCount += 2;
                flippedCards = [];
                canFlip = true;

                if (matchedCount === cards.length) {
                    setTimeout(() => alert(`Tebrikler! ${moves} hamlede bitirdin.`), 500);
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    card1.textContent = '';
                    card2.textContent = '';
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }

        function resetGame() {
            moves = 0;
            matchedCount = 0;
            flippedCards = [];
            document.getElementById('moves').textContent = moves;
            createBoard();
        }

        // Oyunu başlat
        createBoard();
    </script>
</body>
</html>
