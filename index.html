<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Bilişsel Test Paneli</title>
    <style>
        body { background: #0f172a; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 800px; margin: 0 auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; cursor: pointer; border: 1px solid #334155; }
        .card:hover { border-color: #6366f1; }
        .game-wrapper { display: none; background: #1e293b; padding: 30px; border-radius: 15px; max-width: 500px; margin: 20px auto; }
        .btn { background: #273549; color: #fff; padding: 15px; margin: 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; width: 80%; }
        .btn:hover { background: #33445c; }
        .back-btn { background: #ef4444; margin-top: 30px; font-weight: bold; }
        .back-btn:hover { background: #dc2626; }
        #pattern-display { font-size: 32px; font-weight: bold; margin: 20px; color: #6366f1; }
    </style>
</head>
<body>

    <h1>Bilişsel Test Merkezi</h1>
    <p style="color: #94a3b8; margin-bottom: 30px;">Lütfen oynamak istediğiniz modülü seçin.</p>

    <!-- ANA MENÜ -->
    <div id="menu-view" class="menu-grid">
        <div class="card" onclick="startPatternGame()">
            <h2>🔢 Sayısal Örüntü</h2>
            <p>Sayı dizisindeki kuralı bulun.</p>
        </div>
        <div class="card" onclick="startMatrixGame()">
            <h2>🧩 Matris Testi</h2>
            <p>Mantıksal sembolü tamamlayın.</p>
        </div>
    </div>

    <!-- OYUN 1: ÖRÜNTÜ -->
    <div id="game-patterns" class="game-wrapper">
        <h2>Sayısal Örüntü Analizi</h2>
        <div id="pattern-display"></div>
        <div id="pattern-options"></div>
        <button class="btn back-btn" onclick="backToMenu()">◀ Menüye Geri Dön</button>
    </div>

    <!-- OYUN 2: MATRİS -->
    <div id="game-matrix" class="game-wrapper">
        <h2>Matris Matürasyon Testi</h2>
        <div id="matrix-display" style="font-size: 40px; margin: 20px;"></div>
        <div id="matrix-options"></div>
        <button class="btn back-btn" onclick="backToMenu()">◀ Menüye Geri Dön</button>
    </div>

    <script>
        // Sayfa geçişleri için temel fonksiyonlar
        function backToMenu() {
            document.getElementById('game-patterns').style.display = 'none';
            document.getElementById('game-matrix').style.display = 'none';
            document.getElementById('menu-view').style.display = 'grid';
        }

        function startPatternGame() {
            document.getElementById('menu-view').style.display = 'none';
            document.getElementById('game-patterns').style.display = 'block';
            
            // Soru üretimi
            let artis = Math.floor(Math.random() * 5) + 3;
            let start = Math.floor(Math.random() * 10) + 1;
            let soru = `${start} - ${start+artis} - ${start+2*artis} - ?`;
            let cevap = start + 3*artis;

            document.getElementById('pattern-display').innerText = soru;

            // Seçenekler
            let optsDiv = document.getElementById('pattern-options');
            optsDiv.innerHTML = '';
            let seçenekler = [cevap, cevap+2, cevap-3, cevap+5].sort(() => Math.random() - 0.5);

            seçenekler.forEach(s => {
                let btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = s;
                btn.onclick = function() {
                    if(s === cevap) { alert('Doğru Tebrikler!'); startPatternGame(); }
                    else { alert('Yanlış, tekrar deneyin.'); }
                };
                optsDiv.appendChild(btn);
            });
        }

        function startMatrixGame() {
            document.getElementById('menu-view').style.display = 'none';
            document.getElementById('game-matrix').style.display = 'block';

            let sorular = [
                { q: '⬆️ ➡️ ⬇️ ?', a: '⬅️', o: ['⬅️', '↗️', '⬇️', '↖️'] },
                { q: '🟢 🟩 🔵 ?', a: '🟦', o: ['🟦', '🔺', '🟡', '⚫'] }
            ];
            let secilen = sorular[Math.floor(Math.random() * sorular.length)];

            document.getElementById('matrix-display').innerText = secilen.q;

            let optsDiv = document.getElementById('matrix-options');
            optsDiv.innerHTML = '';
            secilen.o.forEach(s => {
                let btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = s;
                btn.onclick = function() {
                    if(s === secilen.a) { alert('Harika, Doğru!'); startMatrixGame(); }
                    else { alert('Hatalı seçim.'); }
                };
                optsDiv.appendChild(btn);
            });
        }
    </script>
</body>
</html>
